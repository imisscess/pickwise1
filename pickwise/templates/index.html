<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PickWise – Dota 2 Counter Guide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
    <div class="app-shell">
        <!-- Collapsible sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="app-title">PickWise</span>
                <div class="sidebar-header-actions">
                    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle color theme">
                        <span class="theme-icon" aria-hidden="true">🌙</span>
                    </button>
                    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle sidebar" type="button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                    </button>
                </div>
            </div>
            <button id="new-chat-btn" class="new-chat-btn" type="button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                <span>New chat</span>
            </button>
            <div class="sidebar-section-label">Recent conversations</div>
            <nav id="chat-list" class="chat-list" aria-label="Conversation list">
                <!-- Filled by history.js -->
            </nav>
        </aside>

        <!-- Overlay when sidebar open on mobile -->
        <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

        <!-- Main chat panel -->
        <main class="chat-panel">
            <header class="chat-header">
                <button type="button" class="chat-menu-btn" id="chat-menu-btn" aria-label="Open menu">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
                </button>
                <h1 class="chat-header-title">PickWise Tactical Coach</h1>
            </header>

            <section class="quick-suggestions" aria-label="Quick suggestions">
                <div class="quick-suggestions-inner">
                    <button class="suggestion-chip" type="button" data-suggestion="Who counters Anti-Mage?">Who counters Anti-Mage?</button>
                    <button class="suggestion-chip" type="button" data-suggestion="Best items for Phantom Assassin?">Best items for PA</button>
                    <button class="suggestion-chip" type="button" data-suggestion="How do I beat Sniper?">How to beat Sniper?</button>
                    <button class="suggestion-chip" type="button" data-suggestion="What does Black King Bar do?">What does BKB do?</button>
                </div>
            </section>

            <section id="chat-log" class="chat-log" aria-live="polite">
                <!-- Messages rendered here -->
            </section>

            <footer class="chat-input-bar">
                <div class="input-inner">
                <div class="input-wrapper">
                    <textarea
                        id="chat-input"
                        rows="1"
                        placeholder="Message PickWise…"
                        autocomplete="off"
                        aria-label="Message input"
                    ></textarea>
                    <button id="send-btn" class="send-btn" type="button" aria-label="Send message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
                </div>
            </footer>
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/history.js') }}"></script>
    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
